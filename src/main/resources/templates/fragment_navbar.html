<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="stylesheet" th:href="@{/estiloNavbar.css}">
    <style>

    </style>
</head>
<body>
<nav th:fragment="navBar">
    <div class="navbar" role="navigation" aria-label="Main">
        <div class="navbar__row navbar__row--primary">
            <a th:href="@{/}">Home</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/createMovie}">New movie</a>
            <a sec:authorize="isAnonymous()" th:href="@{/login}" class="navbar__login" >Login</a>

        </div>

        <div class="navbar__row navbar__row--secondary">
            <!-- NO LOGUEADO -->

            <!-- LOGUEADO -->
            <span sec:authorize="isAuthenticated()" class="navbar__user" sec:authentication="name"></span>

            <form sec:authorize="isAuthenticated()" class="navbar__logout" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
